services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: larahostpanel_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    networks:
      - larahostpanel
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: larahostpanel_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - larahostpanel
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: larahostpanel_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-larahostpanel}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-larahostpanel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - larahostpanel
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: larahostpanel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - larahostpanel

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: larahostpanel_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
    networks:
      - larahostpanel
    depends_on:
      mysql:
        condition: service_healthy

networks:
  larahostpanel:
    driver: bridge

volumes:
  mysql_data:
